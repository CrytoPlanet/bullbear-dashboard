name: 获取市场数据

on:
  schedule:
    # 每6小时运行一次 (UTC时间 00:00 / 06:00 / 12:00 / 18:00)
    - cron: '0 */6 * * *'
  push:
    branches:
      - main
      - 'feat/**'
  workflow_dispatch: # 允许手动触发

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: |
          cd backend
          pip install fastapi uvicorn requests python-dotenv pandas lxml html5lib cloudscraper yfinance

      - name: 获取市场数据
        env:
          CMC_API_KEY: ${{ secrets.CMC_API_KEY }}
          TAAPI_SECRET: ${{ secrets.TAAPI_SECRET }}
        run: |
          cd backend
          python scripts/fetch_and_save_data.py

      - name: Release data
        uses: softprops/action-gh-release@v2
        with:
          files: |
            frontend/public/data/*.json
          tag_name: data
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}